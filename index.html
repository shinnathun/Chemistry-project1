<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดลอง — CaCO₃(s) + 2HCl(aq)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;700&family=Sarabun:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171f2b;
    --panel:#1f2a3a;
    --panel-2:#25324480;
    --line:#33455c;
    --ink:#e9edf3;
    --ink-dim:#9fb0c3;
    --orange:#e2703a;
    --orange-dim:#c85f2e;
    --teal:#6fd7c5;
    --gold:#e8c07a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, #24314530, transparent),
      var(--bg);
    color:var(--ink);
    font-family:'Sarabun',sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:32px 16px;
  }
  h1{font-family:'Noto Serif Thai',serif;font-weight:700;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .card{
    width:100%;max-width:640px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:24px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--orange);margin-bottom:10px;display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:"";width:20px;height:1px;background:var(--orange);display:inline-block;}
  h1{font-size:20px;margin-bottom:14px;}
  .eq{
    display:inline-block;
    background:linear-gradient(135deg,var(--orange),var(--orange-dim));
    color:#1b1005;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    padding:8px 16px;border-radius:6px;
    font-size:13.5px;
    margin-bottom:18px;
  }

  #simWrap{
    position:relative;
    width:100%;height:340px;border-radius:6px;overflow:hidden;background:#101724;
  }
  canvas{display:block;position:absolute;top:0;left:0;}
  #errBox{
    display:none;position:absolute;inset:0;padding:16px;color:#ffb4a8;
    font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:pre-wrap;
    background:#101724;overflow:auto;
  }

  .legend{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--ink-dim);flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .controls{margin-top:18px;}
  .temp-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
  .temp-row .label{font-size:13px;color:var(--ink-dim);}
  .temp-row .val{font-family:'IBM Plex Mono',monospace;font-size:22px;color:var(--gold);}
  input[type=range]{
    width:100%;-webkit-appearance:none;height:4px;border-radius:2px;
    background:linear-gradient(90deg,#4a7cc9,var(--orange) 80%, #d9432f);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--ink);border:3px solid var(--orange);cursor:pointer;
  }
  .presets{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .presets button{
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);
    font-family:'Sarabun',sans-serif;font-size:12.5px;padding:7px 12px;border-radius:20px;
    cursor:pointer;transition:.15s;
  }
  .presets button:hover{border-color:var(--orange);color:var(--ink);}
  .presets button.active{background:var(--orange);color:#1b1005;border-color:var(--orange);font-weight:600;}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
  .stat{
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;
  }
  .stat .n{font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--teal);}
  .stat .l{font-size:11.5px;color:var(--ink-dim);margin-top:2px;}
  .resetbtn{
    margin-top:14px;width:100%;background:none;border:1px solid var(--line);color:var(--ink-dim);
    padding:9px;border-radius:6px;font-family:'Sarabun',sans-serif;cursor:pointer;font-size:13px;
  }
  .resetbtn:hover{border-color:var(--orange);color:var(--ink);}
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">กลุ่ม 3 · แบบทดลอง</div>
  <h1>ผลของอุณหภูมิต่ออัตราการเกิดปฏิกิริยา</h1>
  <div class="eq">CaCO₃(s) + 2HCl(aq) → CaCl₂(aq) + CO₂(g) + H₂O(l)</div>

  <div id="simWrap">
    <canvas id="sim" width="560" height="340"></canvas>
    <div id="errBox"></div>
  </div>
  <div class="legend">
    <span><i class="dot" style="background:#6fd7c5"></i> อนุภาค HCl</span>
    <span><i class="dot" style="background:#e2703a"></i> การชนที่มีผล → เกิด CO₂</span>
    <span><i class="dot" style="background:#4a5b73"></i> การชนที่ไม่มีผล</span>
  </div>

  <div class="controls">
    <div class="temp-row">
      <span class="label">อุณหภูมิสารละลาย</span>
      <span class="val mono"><span id="tempVal">25</span>°C</span>
    </div>
    <input type="range" id="tempSlider" min="0" max="45" value="25" step="1">
    <div class="presets">
      <button data-t="4" data-label="เย็น">เย็น (~4°C)</button>
      <button data-t="25" data-label="ห้อง" class="active">ห้อง (~25°C)</button>
      <button data-t="42" data-label="อุ่น">อุ่น (40–45°C)</button>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="n mono" id="statColl">0</div><div class="l">การชนทั้งหมด / วินาที</div></div>
    <div class="stat"><div class="n mono" id="statEff">0</div><div class="l">การชนที่มีผล / วินาที</div></div>
    <div class="stat"><div class="n mono" id="statPct">0%</div><div class="l">โอกาสชนแล้วเกิดปฏิกิริยา</div></div>
    <div class="stat"><div class="n mono" id="statSpeed">0</div><div class="l">อัตราเร็วเฉลี่ยสัมพัทธ์</div></div>
  </div>
  <button class="resetbtn" id="resetBtn">รีเซ็ตการทดลอง</button>
</div>

<script>
function showError(e){
  var box = document.getElementById('errBox');
  var canvas = document.getElementById('sim');
  if(canvas) canvas.style.display = 'none';
  if(box){
    box.style.display = 'block';
    box.textContent = 'เกิดข้อผิดพลาดในการแสดงผล:\n' + (e && e.message ? e.message : e) + (e && e.stack ? ('\n\n'+e.stack) : '');
  }
}
window.addEventListener('error', function(ev){ showError(ev.error || ev.message); });

function boot(){
try{
  const simWrap = document.getElementById('simWrap');
  const simCanvas = document.getElementById('sim');
  const simCtx = simCanvas.getContext('2d');
  if(!simCtx){ throw new Error('Canvas 2D context ไม่พร้อมใช้งานบนอุปกรณ์นี้'); }

  const slider = document.getElementById('tempSlider');
  const tempVal = document.getElementById('tempVal');
  const statColl = document.getElementById('statColl');
  const statEff = document.getElementById('statEff');
  const statPct = document.getElementById('statPct');
  const statSpeed = document.getElementById('statSpeed');
  const resetBtn = document.getElementById('resetBtn');
  const presetBtns = document.querySelectorAll('.presets button');

  const SIM_H = 340;
  let simW = 560;

  function resizeCanvas(){
    const measured = simWrap.getBoundingClientRect().width;
    const w = Math.max(Math.round(measured) || 0, 200);
    simW = w;
    simCanvas.width = w;
    simCanvas.height = SIM_H;
  }

  const N_PARTICLES = 42;
  let particles = [];
  let temp = 25;
  let surfaceLevel = 0;
  let collisionsThisSec = 0, effThisSec = 0;
  let lastSecTick = performance.now();
  let bubbles = [];

  // Visual speed of particles: rises clearly with temperature (exaggerated
  // for teaching purposes, not a strict physical Kelvin-scaling).
  function speedScale(T){
    return 0.34 + (T/45)*0.78;
  }

  // Probability that a given collision is "effective" (has enough energy
  // to cross the activation-energy barrier). Uses the classic teaching
  // rule of thumb that reaction rate roughly doubles every 10°C (Q10 = 2),
  // anchored at 25% effective collisions at room temperature (25°C).
  function reactionProbability(T){
    const T0 = 25, P0 = 0.25, Q10 = 2;
    const p = P0 * Math.pow(Q10, (T - T0) / 10);
    return Math.min(Math.max(p, 0.03), 0.92);
  }

  function initParticles(){
    particles = [];
    for(let i=0;i<N_PARTICLES;i++){
      const s = speedScale(temp);
      const ang = Math.random()*Math.PI*2;
      particles.push({
        x: Math.random()*simW,
        y: Math.random()*(SIM_H*0.72),
        vx: Math.cos(ang)*s*(0.6+Math.random()*0.8),
        vy: Math.sin(ang)*s*(0.6+Math.random()*0.8),
        r: 3.2
      });
    }
  }

  function resetAll(){
    surfaceLevel = 0;
    bubbles = [];
    initParticles();
  }

  function setTemp(t, label){
    temp = t;
    slider.value = t;
    tempVal.textContent = t;
    presetBtns.forEach(function(b){ b.classList.toggle('active', !!(label && b.dataset.label===label)); });
    if(!label) presetBtns.forEach(function(b){ b.classList.remove('active'); });
    const s = speedScale(temp);
    particles.forEach(function(p){
      const cur = Math.hypot(p.vx,p.vy) || 0.001;
      const targetMag = s*(0.6+Math.random()*0.8);
      p.vx = p.vx/cur*targetMag;
      p.vy = p.vy/cur*targetMag;
    });
  }

  function step(){
    const surfaceY = SIM_H - 34 - surfaceLevel*40;
    const pReact = reactionProbability(temp);

    particles.forEach(function(p){
      p.x += p.vx; p.y += p.vy;
      if(p.x < p.r){p.x=p.r; p.vx*=-1;}
      if(p.x > simW-p.r){p.x=simW-p.r; p.vx*=-1;}
      if(p.y < p.r){p.y=p.r; p.vy*=-1;}
      if(p.y > surfaceY - p.r){
        p.y = surfaceY - p.r;
        p.vy *= -1;
        collisionsThisSec++;
        const effective = Math.random() < pReact;
        if(effective){
          effThisSec++;
          bubbles.push({x:p.x, y:surfaceY, r:2, a:1});
          surfaceLevel = Math.min(surfaceLevel + 0.0015, 0.55);
          const s = speedScale(temp);
          const ang = Math.random()*Math.PI*2;
          p.vx = Math.cos(ang)*s*(0.6+Math.random()*0.8);
          p.vy = Math.sin(ang)*s*(0.6+Math.random()*0.8);
          p.flashEff = 10;
        } else {
          p.flashMiss = 10;
        }
      }
    });

    bubbles.forEach(function(b){ b.y -= 0.9; b.r += 0.05; b.a -= 0.02; });
    bubbles = bubbles.filter(function(b){ return b.a>0; });

    const now = performance.now();
    if(now - lastSecTick > 1000){
      statColl.textContent = collisionsThisSec;
      statEff.textContent = effThisSec;
      collisionsThisSec = 0; effThisSec = 0;
      lastSecTick = now;
    }

    statPct.textContent = (pReact*100).toFixed(1)+'%';
  }

  function draw(){
    simCtx.clearRect(0,0,simW,SIM_H);

    const g = simCtx.createLinearGradient(0,0,0,SIM_H);
    g.addColorStop(0,'#101724'); g.addColorStop(1,'#0c121c');
    simCtx.fillStyle = g; simCtx.fillRect(0,0,simW,SIM_H);

    const surfaceY = SIM_H - 34 - surfaceLevel*40;

    simCtx.fillStyle = '#5c4327';
    simCtx.fillRect(0, surfaceY, simW, SIM_H-surfaceY);
    simCtx.fillStyle = '#7a5a37';
    for(let i=0;i<70;i++){
      const rx = (i*53)%simW + ((i*37)%17);
      const ry = surfaceY + 6 + (i*13)%Math.max(SIM_H-surfaceY-8,1);
      simCtx.fillRect(rx, ry, 3, 3);
    }
    simCtx.strokeStyle = '#e2703a55';
    simCtx.beginPath(); simCtx.moveTo(0,surfaceY); simCtx.lineTo(simW,surfaceY); simCtx.stroke();

    bubbles.forEach(function(b){
      simCtx.beginPath();
      simCtx.fillStyle = 'rgba(226,112,58,' + Math.max(b.a,0) + ')';
      simCtx.arc(b.x,b.y,b.r,0,Math.PI*2);
      simCtx.fill();
    });

    particles.forEach(function(p){
      simCtx.beginPath();
      let color = '#6fd7c5';
      if(p.flashEff && p.flashEff>0){ color='#e2703a'; p.flashEff--; }
      if(p.flashMiss && p.flashMiss>0){ color='#4a5b73'; p.flashMiss--; }
      simCtx.fillStyle = color;
      simCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      simCtx.fill();
    });

    const avgSpeed = particles.reduce(function(s,p){ return s+Math.hypot(p.vx,p.vy); },0)/particles.length;
    statSpeed.textContent = avgSpeed.toFixed(2);
  }

  let loopFailed = false;
  function loop(){
    if(loopFailed) return;
    try{
      step();
      draw();
    }catch(e){
      loopFailed = true;
      showError(e);
      return;
    }
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', function(){
    try{ resizeCanvas(); }catch(e){ showError(e); }
  });
  slider.addEventListener('input', function(){ setTemp(parseInt(slider.value,10), null); });
  presetBtns.forEach(function(b){
    b.addEventListener('click', function(){ setTemp(parseInt(b.dataset.t,10), b.dataset.label); });
  });
  resetBtn.addEventListener('click', resetAll);

  resizeCanvas();
  setTemp(25, 'ห้อง');
  initParticles();
  requestAnimationFrame(loop);

}catch(e){
  showError(e);
}
}

if(document.readyState === 'complete' || document.readyState === 'interactive'){
  boot();
} else {
  document.addEventListener('DOMContentLoaded', boot);
}
</script>
</body>
</html>
